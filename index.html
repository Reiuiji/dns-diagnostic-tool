<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global DNS Diagnostic Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08090f;
            --panel-bg: rgba(20, 22, 37, 0.4);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #8b5cf6;
            --accent-secondary: #6366f1;
            --accent-glow: rgba(139, 92, 246, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --color-success: #10b981;
            --color-error: #ef4444;
            --color-warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 1.5rem;
        }

        .title-group h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .title-group p {
            color: var(--text-muted);
            margin-top: 0.25rem;
            font-size: 1rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--color-success);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--color-success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Glassmorphic Panel styling */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(139, 92, 246, 0.2);
        }

        /* Search form styling */
        .search-form {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 1rem;
            align-items: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 0.85rem 1.2rem;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .btn-check {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 0.95rem 2rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            align-self: flex-end;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
            filter: brightness(1.1);
        }

        .btn-check:active {
            transform: translateY(0);
        }

        /* Results dashboard grid */
        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .search-resolver {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            width: 250px;
            font-size: 0.9rem;
        }

        .resolver-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.25rem;
            width: 100%;
        }

        /* Resolver Card styling */
        .resolver-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .resolver-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .resolver-card.running {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        .resolver-card.running::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            width: 30%;
            animation: slide-progress 1.5s infinite linear;
        }

        @keyframes slide-progress {
            0% { left: -30%; }
            100% { left: 110%; }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .resolver-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .resolver-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .badge-pending {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .latency {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .latency.fast { color: var(--color-success); }
        .latency.slow { color: var(--color-warning); }

        .rcode {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .card-records {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .record-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #d1d5db;
            word-break: break-all;
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .record-item:last-child {
            border-bottom: none;
        }

        /* Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.open {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #0f111a;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            width: 90%;
            max-width: 650px;
            padding: 2rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal.open .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-header h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .modal-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .modal-section {
            margin-bottom: 1.5rem;
        }

        .modal-section h4 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.25rem;
        }

        .modal-pre {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #e5e7eb;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
            white-space: pre-wrap;
            word-break: break-all;
        }

        @media (max-width: 900px) {
            .search-form {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .btn-check {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Title and general status -->
        <header>
            <div class="title-group">
                <h1>Global DNS Lookup</h1>
                <p>Verify DNS propagation and check record consistency globally</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Service Active</span>
            </div>
        </header>

        <!-- Search Form panel -->
        <div class="glass-panel">
            <div class="search-form">
                <div class="input-group">
                    <label for="domain-input">Domain Name</label>
                    <input type="text" id="domain-input" placeholder="e.g. vh4bh.equestria.horse" value="vh4bh.equestria.horse">
                </div>
                <div class="input-group">
                    <label for="type-select">Record Type</label>
                    <select id="type-select">
                        <option value="A">A (IPv4 Address)</option>
                        <option value="AAAA">AAAA (IPv6 Address)</option>
                        <option value="NS">NS (Nameserver)</option>
                        <option value="MX">MX (Mail Exchange)</option>
                        <option value="TXT">TXT (Text Record)</option>
                        <option value="CNAME">CNAME (Alias)</option>
                        <option value="SOA">SOA (Start of Authority)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="custom-server">Custom Server (Optional)</label>
                    <input type="text" id="custom-server" placeholder="e.g. 8.8.8.8">
                </div>
                <button class="btn-check" id="btn-resolve">
                    <span>Resolve Domain</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <!-- Dashboard Dashboard grid section -->
        <div class="results-section">
            <div class="section-header">
                <h2>Resolver Diagnostics</h2>
                <input type="text" id="filter-resolver" class="search-resolver" placeholder="Filter resolvers by name/IP...">
            </div>
            <div class="resolver-grid" id="resolvers-container">
                <!-- Resolver Cards will be dynamically rendered here -->
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-header">
                <h3 id="modal-title">Resolver Details</h3>
                <p id="modal-subnet">IP: -- | Latency: --</p>
            </div>
            <div class="modal-section">
                <h4>Answers</h4>
                <div class="modal-pre" id="modal-answers">No answers returned.</div>
            </div>
            <div class="modal-section">
                <h4>Authority Records</h4>
                <div class="modal-pre" id="modal-authorities">No authority records.</div>
            </div>
            <div class="modal-section">
                <h4>Additional Records</h4>
                <div class="modal-pre" id="modal-additionals">No additional records.</div>
            </div>
        </div>
    </div>

    <script>
        const PUBLIC_RESOLVERS = [
            { name: "Google Public DNS", ip: "8.8.8.8", desc: "Global Primary" },
            { name: "Cloudflare Public DNS", ip: "1.1.1.1", desc: "Global Secondary" },
            { name: "Quad9 Secure DNS", ip: "9.9.9.9", desc: "Security Filtered" },
            { name: "OpenDNS Home", ip: "208.67.222.222", desc: "Family Friendly" },
            { name: "AdGuard DNS", ip: "94.140.14.14", desc: "Ad & Tracker Blocker" },
            { name: "Lumen / Level3", ip: "4.2.2.1", desc: "Carrier Backbone" },
            { name: "ControlD Free", ip: "76.76.2.0", desc: "Customizable" },
            { name: "Yandex DNS", ip: "77.88.8.8", desc: "Eastern Europe" },
            { name: "Censurfridns", ip: "91.239.100.100", desc: "Denmark (Unfiltered)" },
            { name: "Digitalcourage", ip: "46.38.225.230", desc: "Germany (Privacy)" },
            { name: "FDN Resolvers", ip: "80.67.169.12", desc: "France (Non-profit)" },
            { name: "XS4ALL", ip: "194.109.6.66", desc: "Netherlands ISP" },
            { name: "CZ.NIC", ip: "217.31.204.130", desc: "Czech Republic" },
            { name: "NASK", ip: "195.187.244.194", desc: "Poland Registry" },
            { name: "GreenNet", ip: "81.187.96.109", desc: "United Kingdom" },
            { name: "Sunet DNS", ip: "192.36.125.150", desc: "Sweden (Academic)" },
            { name: "TIM Resolver", ip: "85.37.17.15", desc: "Italy ISP" },
            { name: "Telefonica", ip: "80.58.61.250", desc: "Spain ISP" }
        ];

        let activeResolvers = [...PUBLIC_RESOLVERS];
        let queryResults = {};

        const container = document.getElementById("resolvers-container");
        const domainInput = document.getElementById("domain-input");
        const typeSelect = document.getElementById("type-select");
        const customServerInput = document.getElementById("custom-server");
        const btnResolve = document.getElementById("btn-resolve");
        const filterInput = document.getElementById("filter-resolver");

        const modal = document.getElementById("detail-modal");
        const modalClose = document.getElementById("modal-close");
        const modalTitle = document.getElementById("modal-title");
        const modalSubnet = document.getElementById("modal-subnet");
        const modalAnswers = document.getElementById("modal-answers");
        const modalAuthorities = document.getElementById("modal-authorities");
        const modalAdditionals = document.getElementById("modal-additionals");

        // Render Cards
        function renderCards() {
            container.innerHTML = "";
            activeResolvers.forEach((res, index) => {
                const card = document.createElement("div");
                card.className = "resolver-card";
                card.id = `card-${index}`;
                card.onclick = () => showDetails(res.ip);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="resolver-info">
                            <h3>${res.name}</h3>
                            <p>${res.desc} — <code>${res.ip}</code></p>
                        </div>
                        <span class="badge badge-pending" id="badge-${index}">Idle</span>
                    </div>
                    <div class="card-meta">
                        <div class="latency" id="latency-${index}">-- ms</div>
                        <div class="rcode" id="rcode-${index}">--</div>
                    </div>
                    <div class="card-records" id="records-${index}">
                        <div style="color: var(--text-muted); font-size: 0.8rem; font-style: italic;">No records resolved yet.</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Run Queries
        async function runQueries() {
            const domain = domainInput.value.trim();
            const qtype = typeSelect.value;
            const customServer = customServerInput.value.trim();

            if (!domain) {
                alert("Please enter a domain name.");
                return;
            }

            // Build dynamic resolver list
            let targetResolvers = [...PUBLIC_RESOLVERS];
            if (customServer) {
                targetResolvers = [{ name: "Custom User DNS", ip: customServer, desc: "User Defined" }, ...targetResolvers];
            }
            activeResolvers = targetResolvers;
            renderCards();

            btnResolve.disabled = true;
            btnResolve.querySelector("span").textContent = "Resolving...";

            const fetchQueue = activeResolvers.map(async (res, index) => {
                const card = document.getElementById(`card-${index}`);
                const badge = document.getElementById(`badge-${index}`);
                const latencyEl = document.getElementById(`latency-${index}`);
                const rcodeEl = document.getElementById(`rcode-${index}`);
                const recordsEl = document.getElementById(`records-${index}`);

                card.classList.add("running");
                badge.className = "badge badge-pending";
                badge.textContent = "Querying";

                try {
                    const response = await fetch(`/api/query?domain=${encodeURIComponent(domain)}&type=${qtype}&server=${res.ip}`);
                    if (!response.ok) throw new Error("HTTP Error");
                    const data = await response.json();
                    
                    queryResults[res.ip] = data;
                    card.classList.remove("running");

                    if (data.error) {
                        badge.className = "badge badge-error";
                        badge.textContent = "Error";
                        latencyEl.textContent = `${data.time_ms} ms`;
                        latencyEl.className = "latency slow";
                        rcodeEl.textContent = "TIMEOUT";
                        recordsEl.innerHTML = `<div class="record-item" style="color: var(--color-error);">${data.error}</div>`;
                    } else {
                        badge.className = "badge badge-success";
                        badge.textContent = "Success";
                        
                        latencyEl.textContent = `${data.time_ms} ms`;
                        latencyEl.className = data.time_ms < 100 ? "latency fast" : "latency slow";
                        rcodeEl.textContent = data.rcode_name;

                        if (data.answers && data.answers.length > 0) {
                            recordsEl.innerHTML = data.answers.map(r => `
                                <div class="record-item">${r.data}</div>
                            `).join("");
                        } else {
                            recordsEl.innerHTML = `<div class="record-item" style="color: var(--text-muted); font-style: italic;">No records found (RCODE: ${data.rcode_name})</div>`;
                        }
                    }
                } catch (err) {
                    card.classList.remove("running");
                    badge.className = "badge badge-error";
                    badge.textContent = "Failed";
                    recordsEl.innerHTML = `<div class="record-item" style="color: var(--color-error);">API Request Failed</div>`;
                }
            });

            await Promise.all(fetchQueue);
            btnResolve.disabled = false;
            btnResolve.querySelector("span").textContent = "Resolve Domain";
        }

        // Modal details
        function showDetails(ip) {
            const data = queryResults[ip];
            if (!data) return;

            const res = activeResolvers.find(r => r.ip === ip);
            modalTitle.textContent = res ? `${res.name} (Query Result)` : "DNS Resolver Result";
            modalSubnet.textContent = `IP: ${ip} | Response Time: ${data.time_ms} ms | RCODE: ${data.rcode_name || 'UNKNOWN'}`;

            // Helper to format detailed record JSON output
            const formatRecords = (records) => {
                if (!records || records.length === 0) return "No records returned.";
                return records.map(r => `[Name: ${r.name}] Type: ${r.type} | TTL: ${r.ttl} | Data: ${r.data}`).join("\n");
            };

            modalAnswers.textContent = formatRecords(data.answers);
            modalAuthorities.textContent = formatRecords(data.authorities);
            modalAdditionals.textContent = formatRecords(data.additionals);

            modal.classList.add("open");
        }

        // Close Modal
        function closeModal() {
            modal.classList.remove("open");
        }

        modalClose.onclick = closeModal;
        window.onclick = (event) => {
            if (event.target === modal) closeModal();
        };

        // Filter search list
        filterInput.oninput = () => {
            const query = filterInput.value.toLowerCase();
            const cards = document.getElementsByClassName("resolver-card");
            activeResolvers.forEach((res, index) => {
                const card = document.getElementById(`card-${index}`);
                if (card) {
                    const match = res.name.toLowerCase().includes(query) || res.ip.includes(query) || res.desc.toLowerCase().includes(query);
                    card.style.display = match ? "flex" : "none";
                }
            });
        };

        btnResolve.onclick = runQueries;

        // Initialize UI
        renderCards();
    </script>
</body>
</html>
